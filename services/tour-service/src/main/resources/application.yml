micronaut:
  application:
    name: tour-service
  server:
    port: 8081
  http:
    client:
      read-timeout: 60s
  router:
    cors:
      enabled: true
      configurations:
        default:
          allowedOrigins:
            - "http://localhost:5173"
            - "http://localhost:3000"
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowCredentials: true
          maxAge: 3600
datasources:
  default:
    url: jdbc:h2:mem:toursdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    schema-generate: CREATE_DROP
    dialect: H2
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        dialect: org.hibernate.dialect.H2Dialect