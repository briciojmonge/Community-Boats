micronaut:
  application:
    name: tour-service
  server:
    port: 8081
datasources:
  default:
    url: jdbc:h2:mem:toursdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: ""
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update